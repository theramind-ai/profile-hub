spring:
  application:
    name: ProfileHub-Backend
  
  datasource:
    url: jdbc:postgresql://postgres:5432/profilehub
    username: profilehub_user
    password: profilehub_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        'format_sql': true
        jdbc:
          'batch_size': 20
          'fetch_size': 50
  
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwtSecret: ${JWT_SECRET:TXlWZXJ5U2VjdXJlSldUU2VjcmV0S2V5MzJCeXRlc0xvbmdGb3JQcm9kdWN0aW9uVXNl}
  jwtExpirationMs: 86400000

logging:
  level:
    root: INFO
    'com.profilehub': DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
