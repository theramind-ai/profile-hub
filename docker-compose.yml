version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: profilehub-postgres
    environment:
      POSTGRES_DB: profilehub
      POSTGRES_USER: profilehub_user
      POSTGRES_PASSWORD: profilehub_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profilehub_user -d profilehub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profilehub-network

  redis:
    image: redis:7-alpine
    container_name: profilehub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profilehub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: profilehub-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/profilehub
      SPRING_DATASOURCE_USERNAME: profilehub_user
      SPRING_DATASOURCE_PASSWORD: profilehub_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-key-change-this-in-production-environment-with-at-least-32-characters
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - profilehub-network
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: profilehub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - profilehub-network
    environment:
      API_URL: http://backend:8080/api

volumes:
  postgres_data:
  redis_data:

networks:
  profilehub-network:
    driver: bridge
