name: Frontend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - "frontend/**"
  pull_request:
    branches: [ main, master ]
    paths:
      - "frontend/**"

jobs:
  build-test:
    name: Build, Lint & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: ./frontend
        run: |
          if npm run lint -- --help > /dev/null 2>&1; then
            npm run lint
          else
            echo "No lint script configured, skipping lint step"
          fi

      - name: Run tests
        working-directory: ./frontend
        run: |
          if npm test -- --help > /dev/null 2>&1; then
            npm test -- --watch=false --browsers=ChromeHeadless || npm test
          else
            echo "No test script configured, skipping test step"
          fi

